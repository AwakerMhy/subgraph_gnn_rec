name: ir50_constlr5e5_ppos95_pneg01
description: "ir=0.5 + constant lr=5e-5 + two_hop_bidir_random recall, p_pos=0.95 p_neg=0.01, 12 datasets x 14 methods, 30 rounds, seeds 0/1/2/3/42"

datasets:
  - name: email_eu
    path: data/processed/email_eu/edges.csv
    n_nodes: 986
  - name: dnc_email
    path: data/processed/dnc_email/edges.csv
    n_nodes: 1866
  - name: college_msg
    path: data/processed/college_msg/edges.csv
    n_nodes: 1899
  - name: bitcoin_alpha
    path: data/processed/bitcoin_alpha/edges.csv
    n_nodes: 3783
  - name: advogato
    path: data/processed/advogato/edges.csv
    n_nodes: 5155
  - name: bitcoin_otc
    path: data/processed/bitcoin_otc/edges.csv
    n_nodes: 5881
  - name: wiki_vote
    path: data/processed/wiki_vote/edges.csv
    n_nodes: 7115
  - name: sx_mathoverflow
    path: data/processed/sx_mathoverflow/edges.csv
    n_nodes: 24759
  - name: epinions
    path: data/processed/epinions/edges.csv
    n_nodes: 75879
  - name: slashdot
    path: data/processed/slashdot/edges.csv
    n_nodes: 77350
  - name: sx_askubuntu
    path: data/processed/sx_askubuntu/edges.csv
    n_nodes: 157222
  - name: sx_superuser
    path: data/processed/sx_superuser/edges.csv
    n_nodes: 192409

methods:
  - random
  - cn
  - aa
  - jaccard
  - pa
  - gnn
  - gnn_h32
  - gnn_concat
  - gnn_concat_h8
  - gnn_sum
  - gnn_sum_h8
  - graphsage_emb
  - gat_emb
  - seal

grid:
  total_rounds: [30]
  seed: [0, 1, 2, 3, 42]
  hidden_dim: [32]

timeouts:
  per_cell_seconds: 14400

oom:
  retry: true

base_config:
  init_edge_ratio: 0.5
  init_strategy: random
  recall:
    method: two_hop_bidir_random
    top_k_recall: 100
  recommend:
    cold_start_random_fill: true
    top_k: 10
  feedback:
    cooldown_mode: decay
    cooldown_rounds: 5
    p_neg: 0.01
    p_pos: 0.95
  replay:
    capacity: 0
    sample_n: 0
  eval:
    degree_bins: 50
    graph_every_n: 10
    k_list: [1, 3, 5, 10]
  trainer:
    update_every_n_rounds: 1
    lr: 0.00005
    grad_clip: 1.0
    min_batch_size: 4
    max_neighbors: 30
    batch_subgraph_max_hop: 2
    scheduler:
      strategy: constant
  runtime:
    device: cuda
    log_every: 1
