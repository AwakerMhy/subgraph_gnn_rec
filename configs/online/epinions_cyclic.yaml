dataset:
  path: data/processed/epinions/edges.csv
  type: epinions
eval:
  degree_bins: 50
  graph_every_n: 10
  k_list:
  - 1
  - 3
  - 5
feedback:
  cooldown_mode: decay
  cooldown_rounds: 5
  p_neg: 0.0
  p_pos: 0.95
init_edge_ratio: 0.05
init_strategy: stratified
model:
  encoder_type: last
  hidden_dim: 8
  node_feat_dim: 0
  num_layers: 3
  type: gnn
recall:
  alpha: 0.15
  method: ppr
  top_k: 100
recommend:
  cold_start_random_fill: true
  top_k: 5
replay:
  capacity: 500
  sample_n: 64
runtime:
  device: cuda
  log_every: 1
  out_dir: results/online/epinions_cyclic
  seed: 42
total_rounds: 100
trainer:
  batch_subgraph_max_hop: 2
  grad_clip: 1.0
  lr: 0.001
  max_neighbors: 30
  min_batch_size: 4
  scheduler:
    cycle_rounds: 25
    min_lr: 1.0e-05
    strategy: cyclic
    warmup_rounds: 5
  score_chunk_size: 1024
  update_every_n_rounds: 1
  use_amp: true
user_selector:
  alpha: 0.5
  beta: 2.0
  gamma: 2.0
  lam: 0.1
  sample_ratio: 0.01
  strategy: composite
  w: 3
