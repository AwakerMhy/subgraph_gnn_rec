dataset:
  path: data/processed/epinions/edges.csv
  type: epinions
eval:
  degree_bins: 50
  graph_every_n: 10
  k_list:
  - 1
  - 3
  - 5
feedback:
  cooldown_mode: decay
  cooldown_rounds: 5
  p_neg: 0.0
  p_pos: 0.95
init_edge_ratio: 0.05
init_strategy: stratified
model:
  type: cn
recall:
  components:
  - name: two_hop_random
    top_k: 70
  - alpha: 0.15
    name: ppr_nodes
    top_k: 30
  method: mixture
  top_k_recall: 100
recommend:
  cold_start_random_fill: true
  top_k: 5
replay:
  capacity: 0
  sample_n: 0
runtime:
  device: cpu
  log_every: 1
  out_dir: results/online/epinions_thr_cn
  seed: 42
total_rounds: 100
trainer:
  update_every_n_rounds: 1
user_selector:
  alpha: 0.5
  beta: 2.0
  gamma: 2.0
  lam: 0.1
  sample_ratio: 0.01
  strategy: composite
  w: 3
