dataset:
  type: college_msg
  path: data/processed/college_msg/edges.csv

init_edge_ratio: 0.05
user_sample_ratio: 0.10
total_rounds: 100

recall:
  method: adamic_adar
  top_k_recall: 50

recommend:
  top_k: 10

feedback:
  p_accept: 1.0
  cooldown_rounds: 5

trainer:
  update_every_n_rounds: 1

model:
  type: random

replay:
  capacity: 0
  sample_n: 0

eval:
  k_list: [5, 10, 20]
  graph_every_n: 10
  degree_bins: 50

runtime:
  seed: 42
  device: cpu
  out_dir: results/online/college_msg_random_ranker
  log_every: 1
