dataset:
  path: data/processed/college_msg/edges.csv
  type: college_msg
eval:
  degree_bins: 50
  graph_every_n: 10
  k_list:
  - 1
  - 3
  - 5
feedback:
  cooldown_rounds: 5
  p_accept: 1.0
init_edge_ratio: 0.05
model:
  type: random
recall:
  method: adamic_adar
  top_k_recall: 50
recommend:
  top_k: 5
replay:
  capacity: 0
  sample_n: 0
runtime:
  device: cpu
  log_every: 1
  out_dir: results/online/college_msg_random_ranker
  seed: 42
total_rounds: 100
trainer:
  update_every_n_rounds: 1
user_sample_ratio: 0.1
