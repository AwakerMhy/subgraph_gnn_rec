dataset:
  path: data/processed/email_eu/edges.csv
  type: email_eu

init_edge_ratio: 0.3
init_strategy: random
total_rounds: 1

model:
  type: seal_full
  hidden_dim: 32
  num_layers: 3
  label_dim: 16
  k: 10
  conv1d_channels: [32, 16]

recall:
  method: two_hop_bidir_random
  top_k_recall: 100

recommend:
  cold_start_random_fill: true
  top_k: 10

feedback:
  cooldown_mode: decay
  cooldown_rounds: 5
  p_pos: 1.0
  p_neg: 0.0

replay:
  capacity: 0
  sample_n: 0

eval:
  degree_bins: 50
  graph_every_n: 1
  k_list: [1, 3, 5, 10]

trainer:
  update_every_n_rounds: 1
  lr: 0.00005
  grad_clip: 1.0
  min_batch_size: 4
  max_neighbors: 30
  batch_subgraph_max_hop: 2
  scheduler:
    strategy: constant

user_selector:
  strategy: uniform
  sample_ratio: 0.1

runtime:
  device: cuda
  log_every: 1
  seed: 42
  out_dir: results/smoke/ir30_seal_full_email_eu
