dataset:
  type: sbm
  params:
    n_nodes: 5000
    n_communities: 5
    p_in: 0.3
    p_out: 0.05
    T: 2000
    edges_per_step: 30
    seed: 42
eval:
  degree_bins: 20
  graph_every_n: 10
  k_list:
  - 1
  - 3
  - 5
feedback:
  cooldown_mode: decay
  cooldown_rounds: 5
  p_neg: 0.0
  p_pos: 1.0
init_edge_ratio: 0.05
init_strategy: stratified
total_rounds: 100
user_selector:
  alpha: 0.5
  beta: 2.0
  gamma: 2.0
  lam: 0.1
  sample_ratio: 0.1
  strategy: composite
  w: 3
model:
  type: random
recall:
  method: two_hop_random
  top_k_recall: 100
recommend:
  cold_start_random_fill: true
  top_k: 10
replay:
  capacity: 0
  sample_n: 0
runtime:
  device: cpu
  log_every: 1
  out_dir: results/online/sbm5k_v2_random_topk10
  seed: 42
trainer:
  update_every_n_rounds: 1
