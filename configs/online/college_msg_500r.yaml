dataset:
  path: data/processed/college_msg/edges.csv
  type: college_msg
eval:
  degree_bins: 50
  graph_every_n: 50
  k_list:
  - 1
  - 3
  - 5
feedback:
  cooldown_rounds: 5
  p_accept: 1.0
init_edge_ratio: 0.05
model:
  encoder_type: last
  hidden_dim: 8
  node_feat_dim: 0
  num_layers: 3
recall:
  method: adamic_adar
  top_k_recall: 50
recommend:
  cold_start_random_fill: true
  top_k: 5
replay:
  capacity: 0
  sample_n: 0
runtime:
  device: cuda
  log_every: 1
  out_dir: results/online/college_msg_500r
  seed: 42
total_rounds: 500
trainer:
  batch_subgraph_max_hop: 2
  grad_clip: 1.0
  lr: 0.001
  max_neighbors: 30
  min_batch_size: 4
  scheduler:
    min_lr: 1.0e-05
    strategy: cosine_warmup
    warmup_rounds: 10
  update_every_n_rounds: 1
user_sample_ratio: 0.1
