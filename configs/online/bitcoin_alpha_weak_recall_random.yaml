dataset:
  type: bitcoin_alpha
  path: data/processed/bitcoin_alpha/edges.csv

init_edge_ratio: 0.05
init_strategy: stratified
total_rounds: 100

user_selector:
  strategy: composite
  alpha: 0.5
  beta: 2.0
  lam: 0.1
  gamma: 2.0
  w: 3
  sample_ratio: 0.10

recall:
  method: mixture
  components:
    - {name: ppr, top_k: 25, alpha: 0.15}
    - {name: community_random, top_k: 25}
  top_k_recall: 50

recommend:
  top_k: 10
  cold_start_random_fill: true

feedback:
  p_pos: 0.8
  p_neg: 0.02
  cooldown_rounds: 5
  cooldown_mode: decay

trainer:
  update_every_n_rounds: 1

model:
  type: random

replay:
  capacity: 0
  sample_n: 0

eval:
  k_list: [5, 10, 20]
  graph_every_n: 10
  degree_bins: 50

runtime:
  seed: 42
  device: cpu
  out_dir: results/online/bitcoin_alpha_weak_recall_random
  log_every: 1
