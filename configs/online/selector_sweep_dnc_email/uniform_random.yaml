dataset:
  path: data/processed/dnc_email/edges.csv
  type: dnc_email
eval:
  degree_bins: 50
  graph_every_n: 10
  k_list:
  - 1
  - 3
  - 5
  - 10
feedback:
  cooldown_mode: decay
  cooldown_rounds: 5
  p_neg: 0.0
  p_pos: 1.0
init_edge_ratio: 0.25
init_strategy: random
model:
  type: random
recall:
  method: two_hop_random
  top_k_recall: 100
recommend:
  cold_start_random_fill: true
  top_k: 10
replay:
  capacity: 0
  sample_n: 0
runtime:
  device: cpu
  log_every: 1
  out_dir: results/online/selector_sweep_dnc_email/uniform_random
  seed: 42
total_rounds: 100
trainer:
  batch_subgraph_max_hop: 2
  grad_clip: 1.0
  lr: 0.001
  max_neighbors: 30
  min_batch_size: 4
  scheduler:
    min_lr: 1.0e-05
    strategy: cosine_warmup
    warmup_rounds: 5
  update_every_n_rounds: 1
user_selector:
  alpha: 0.5
  beta: 2.0
  gamma: 2.0
  lam: 0.1
  sample_ratio: 0.1
  strategy: uniform
  w: 3
