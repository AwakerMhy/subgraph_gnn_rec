name: smoke
description: "2 datasets x 3 methods smoke test (5 rounds)"

datasets:
  - name: email_eu
    path: data/processed/email_eu/edges.csv
    n_nodes: 986
  - name: college_msg
    path: data/processed/college_msg/edges.csv
    n_nodes: 1899

methods:
  - random
  - ground_truth
  - gnn_sum

grid:
  total_rounds: [5]
  seed: [42]
  hidden_dim: [32]

timeouts:
  per_cell_seconds: 300

oom:
  retry: true

base_config:
  init_edge_ratio: 0.25
  init_strategy: random
  recall:
    method: two_hop_random
    top_k_recall: 100
  recommend:
    cold_start_random_fill: true
    top_k: 10
  feedback:
    cooldown_mode: decay
    cooldown_rounds: 5
    p_neg: 0.0
    p_pos: 1.0
  replay:
    capacity: 0
    sample_n: 0
  eval:
    degree_bins: 50
    graph_every_n: 10
    k_list: [1, 3, 5, 10]
  trainer:
    update_every_n_rounds: 1
    lr: 0.001
    grad_clip: 1.0
    min_batch_size: 4
    max_neighbors: 30
    batch_subgraph_max_hop: 2
    scheduler:
      strategy: cosine_warmup
      warmup_rounds: 5
      min_lr: 0.00001
  runtime:
    device: cpu
    log_every: 1
